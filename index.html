<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>

    <script src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython_stdlib.js"></script>

    <style>
        body {
            background-color: black;
            color: #d3d3d3;
            font-family: monospace;
            font-size: 22px;
            padding: 20px;
        }

        .run-btn {
            font-size: 18px;
            padding: 5px 12px;
            margin-left: 10px;
        }

        .green {
            color: #00ff00;
        }
    </style>
</head>

<body onload="brython()">

<span class="green">
Click <button class="run-btn" onclick="run_program()">Run</button> 
to run the Password Strength Checker.
</span>

<pre id="output"></pre>

<script type="text/python">
from browser import document, window

def check_password(password):
    score = 0

    if len(password) >= 8:
        score += 1
    if any(c.isupper() for c in password):
        score += 1
    if any(c.islower() for c in password):
        score += 1
    if any(c.isdigit() for c in password):
        score += 1
    if any(not c.isalnum() for c in password):
        score += 1

    if score <= 2:
        return "❌ Weak Password"
    elif score <= 4:
        return "⚠️ Medium Password"
    else:
        return "✅ Strong Password"

def run_program():
    password = window.prompt("Enter your password:")
    result = check_password(password)
    document["output"].text = result
</script>

</body>
</html>
